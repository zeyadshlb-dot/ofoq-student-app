name: Ofoq White-Label Builder 🚀

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Tenant Slug (e.g., elkemiawy)'
        required: true
        type: string
      build_type:
        description: 'Build Type (apk or aab)'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - aab

jobs:
  build:
    name: Build ${{ github.event.inputs.build_type }} for ${{ github.event.inputs.slug }}
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود من المستودع
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # 2. تسطيب بيئة الجافا عشان الأندرويد
      - name: ☕ Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. تسطيب فلاتر
      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. تحميل مكاتب المشروع
      - name: 📦 Install Dependencies
        run: flutter pub get

      # 5. تشغيل سكريبت الصياعة (الـ White-Label Engine)
      - name: 🏗️ Run Ofoq Build Script
        run: dart run scripts/white_label.dart --slug ${{ github.event.inputs.slug }} --build ${{ github.event.inputs.build_type }}

      # 6. رفع التطبيق المباشر كـ Release 
      - name: 🚀 Create Release and Upload Direct App
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0-${{ github.event.inputs.slug }}-${{ github.run_id }}
          name: App Release - ${{ github.event.inputs.slug }}
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 7. السحر: إرسال اللينكات للباك إند أوتوماتيك
      - name: 🌐 Notify Go Backend with App Links
        run: |
          curl -X PATCH https://unglowing-jovita-expectable.ngrok-free.dev/api/v1/tenants/layout/app-status \
          -H "Content-Type: application/json" \
          -H "ngrok-skip-browser-warning: true" \
          -d '{
            "slug": "${{ github.event.inputs.slug }}",
            "has_app": true,
            "apk_url": "https://github.com/zeyadshlb-dot/ofoq-student-app/releases/download/v1.0-${{ github.event.inputs.slug }}-${{ github.run_id }}/app-release.apk",
            "aab_url": "https://github.com/zeyadshlb-dot/ofoq-student-app/releases/download/v1.0-${{ github.event.inputs.slug }}-${{ github.run_id }}/app-release.aab"
          }'